<script>

const box = document.getElementById("menu");

menuItems
.filter(item => item.restaurant === "asha")
.forEach(item => {

box.innerHTML += `

<div class="menu-card">

<img src="${item.image}" alt="${item.name}">

<div class="menu-content">

<h3>${item.name}</h3>

<p>${item.category}</p>

<div class="price">¥${item.price}</div>

</div>

</div>

`;

});

</script>
